<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛР 6 - Каталог товарів</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Каталог товарів</h1>
    <div class="total-price-container">
        Загальна вартість: <span id="total-price">0.00 ₴</span>
    </div>
</header>

<main>
    <section class="controls">
        <div class="filters">
            <h3>Фільтрація:</h3>
            <div id="filter-buttons">
            </div>
            <button id="reset-filter-btn" class="reset-btn">Скинути фільтр</button>
        </div>

        <div class="sorting">
            <h3>Сортування:</h3>
            <button class="sort-btn" data-sort="price">За ціною</button>
            <button class="sort-btn" data-sort="createdAt">За датою створення</button>
            <button class="sort-btn" data-sort="updatedAt">За датою оновлення</button>
            <button id="reset-sort-btn" class="reset-btn">Скинути сортування</button>
        </div>

        <button id="add-new-product-btn" class="primary-btn">Додати новий товар</button>
    </section>

    <section id="product-list" class="product-grid">
        <p id="empty-message">Наразі список товарів пустий. Додайте новий товар.</p>
    </section>
</main>

<div id="product-modal" class="modal hidden">
    <div class="modal-content">
        <h2 id="modal-title">Додати товар</h2>
        <form id="product-form">
            <input type="hidden" id="product-id">

            <label for="product-name">Назва товару:</label>
            <input type="text" id="product-name" required minlength="2">

            <label for="product-price">Ціна:</label>
            <input type="number" id="product-price" required min="0.01" step="0.01">

            <label for="product-category">Категорія:</label>
            <select id="product-category" required>
                <option value="" disabled selected>Оберіть категорію</option>
                <option value="Електроніка">Електроніка</option>
                <option value="Одяг">Одяг</option>
                <option value="Книги">Книги</option>
                <option value="Інше">Інше</option>
            </select>

            <label for="product-image">URL зображення:</label>
            <input type="url" id="product-image" required>

            <div class="modal-actions">
                <button type="submit" id="save-product-btn" class="primary-btn">Зберегти</button>
                <button type="button" id="close-modal-btn">Скасувати</button>
            </div>
        </form>
    </div>
</div>

<div id="snackbar" class="hidden"></div>

<script src="lab-6.js"></script>
</body>
</html>
